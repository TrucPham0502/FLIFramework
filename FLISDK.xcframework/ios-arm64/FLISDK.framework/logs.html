<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Logs</title>
<style>
:root{
  --bg: #0f1113;
  --panel: #0b0c0d;
  --muted: #8b98a8;
  --info: #2b90ff;
  --warn: #ffb020;
  --error: #ff6b6b;
  --debug: #7dd3fc;
  --text: #e6eef6;
  --accent: #6ee7b7;
  --new-badge: #ffb86b;
  --max-w: 1100px;
  --g: 12px;
}
html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family: ui-monospace, SFMono-Regular, Menlo, monospace;-webkit-font-smoothing:antialiased;}
.wrap{display:flex;flex-direction:column;height:100vh;width:100vw;max-width:none;margin:0;padding:12px;box-sizing:border-box;background:transparent;} /* full-screen container */
header{display:flex;align-items:center;gap:var(--g);margin-bottom:8px;flex-wrap:wrap;}
header h3{margin:0;font-weight:600;font-size:16px;}
#status{font-size:13px;color:var(--muted)}
#controls{margin-left:auto;font-size:13px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#controls button{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted);padding:6px 8px;border-radius:6px;cursor:pointer}
#controls .primary{border-color:rgba(110,231,183,0.12);color:var(--accent)}
#log{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:10px;border-radius:8px;flex:1;overflow:auto;border:1px solid rgba(255,255,255,0.02);min-height:0;} /* fill remaining height */
.line{padding:8px;border-bottom:1px solid rgba(255,255,255,0.02);display:flex;gap:12px;align-items:flex-start;}
.t{width:210px;flex:0 0 210px;color:var(--muted);font-size:12px}
.content{flex:1;min-width:0}
.meta{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;margin-right:8px;vertical-align:middle}
.level-info .meta{background:rgba(43,144,255,0.12);color:var(--info);border:1px solid rgba(43,144,255,0.08)}
.level-warning .meta{background:rgba(255,176,32,0.10);color:var(--warn);border:1px solid rgba(255,176,32,0.08)}
.level-error .meta{background:rgba(255,107,107,0.10);color:var(--error);border:1px solid rgba(255,107,107,0.08)}
.level-debug .meta{background:rgba(125,211,252,0.06);color:var(--debug);border:1px solid rgba(125,211,252,0.06)}
.title{font-weight:600;margin-bottom:6px}
.message{white-space:pre-wrap;font-size:13px;color:var(--text);line-height:1.35}
.json-block{background:#071018;padding:10px;border-radius:6px;margin-top:6px;border:1px solid rgba(255,255,255,0.02);overflow:auto;font-size:12px}
.json-toggle{cursor:pointer;font-size:12px;color:var(--muted);border:none;background:none;margin-left:8px}
.json-copy-btn{cursor:pointer;font-size:12px;color:var(--muted);border:none;background:none;margin-left:6px}
.json-key{color:#ffd580}
.json-string{color:#9be18d}
.json-number{color:#8cf0ff}
.json-boolean{color:#ffb86b}
.json-null{color:#9aa1a6}
.small{font-size:12px;color:var(--muted)}

.level-warning .message { color: var(--warn); }
.level-error .message { color: var(--error); }

.level-warning .json-block,
.level-error .json-block {
  color: var(--text) !important;
}
.json-block .json-key { color: #ffd580; }
.json-block .json-string { color: #9be18d; }
.json-block .json-number { color: #8cf0ff; }
.json-block .json-boolean { color: #ffb86b; }
.json-block .json-null { color: #9aa1a6; }

/* stats panel */
#statsPanel {
  display:flex;
  gap:10px;
  align-items:center;
  margin-left:8px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}
.stat {
  padding:6px 10px;
  border-radius:8px;
  background: rgba(255,255,255,0.02);
  font-size:13px;
  display:flex;
  gap:8px;
  align-items:center;
}
.stat .label { color:var(--muted); font-size:12px; }
.stat .value { font-weight:700; font-size:13px; }
.stat.error { color:var(--error); }
.stat.warning { color:var(--warn); }
.stat.info { color:var(--accent); }

/* small badge for totals vs visible */
.stat .sub { font-size:11px; color:var(--muted); margin-left:6px; }

#newBadge {
  position: fixed;
  right: 24px;
  bottom: 24px;
  background: linear-gradient(180deg,#ffcf9a,#ffb86b);
  color: #111;
  padding: 8px 12px;
  border-radius: 20px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.4);
  font-weight:600;
  display:none;
  cursor:pointer;
  z-index: 9999;
}

/* small toast */
#toast {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: 84px;
  background: rgba(20,20,20,0.9);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 8px;
  font-size:13px;
  display:none;
  z-index:10000;
  border:1px solid rgba(255,255,255,0.03);
}

/* search box styling */
.search-wrap{display:flex;gap:8px;align-items:center;border-radius:8px;padding:6px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.02)}
.search-wrap input[type="search"]{background:transparent;border:none;color:var(--text);outline:none;font-size:13px;padding:6px;width:260px}
.search-wrap select, .search-wrap label {font-size:12px;color:var(--muted)}
.search-wrap input[type="checkbox"]{accent-color:var(--accent)}

@media (max-width: 900px) {
  :root{ --max-w: 920px; }
  .t{flex-basis:160px;width:160px}
  #log{max-height:70vh}
  .search-wrap input[type="search"]{width:160px}
}

@media (max-width: 720px) {
  .wrap{margin:10px;padding:10px}
  header{align-items:flex-start}
  header h3{font-size:15px}
  #controls{margin-left:0;margin-top:8px}
  .t{flex-basis:140px;width:140px}
  #log{max-height:calc(100vh - 260px)}
  #controls button{padding:8px 10px;font-size:13px}
  .line{padding:10px}
  .search-wrap input[type="search"]{width:120px}
}

@media (max-width: 420px){
  .line{flex-direction:column;align-items:flex-start;gap:8px;padding:10px}
  .t{display:block;flex-basis:100%;width:100%;color:var(--muted);font-size:12px;margin:0 0 6px 0}
  .title{font-size:15px}
  .message{font-size:14px}
  .meta{font-size:12px;padding:4px 10px}
  .small-mobile{display:block;margin-bottom:6px;color:var(--muted)}
  #newBadge{right:12px;bottom:12px;padding:10px 14px}
  #log{max-height:calc(100vh - 200px)}
}

/* hide mobile timestamp by default (desktop) */
.small-mobile{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div style="display:flex;align-items:center;gap:12px;min-width:0">
      <h3>FLI — logs</h3>
      <div id="status">Connecting...</div>
      
      <!-- STATS PANEL -->
      <div id="statsPanel" aria-hidden="false">
        <div class="stat error">
          <span class="label">ERROR</span>
          <span class="value" id="errVisible">0</span>
          <span class="sub">/ <span id="errTotal">0</span></span>
        </div>
        <div class="stat warning">
          <span class="label">WARNING</span>
          <span class="value" id="warnVisible">0</span>
          <span class="sub">/ <span id="warnTotal">0</span></span>
        </div>
        <div class="stat info">
          <span class="label">INFO</span>
          <span class="value" id="infoVisible">0</span>
          <span class="sub">/ <span id="infoTotal">0</span></span>
        </div>
      </div>

    </div>

    <!-- SEARCH UI -->
    <div class="search-wrap" title="Search logs">
      <input id="searchInput" type="search" placeholder="Search logs (text or regex)" />
      <select id="searchScope" title="Scope">
        <option value="all">All</option>
        <option value="title">Title</option>
        <option value="message">Message</option>
        <option value="level">Level</option>
      </select>
      <label title="Regex"><input id="searchRegex" type="checkbox" /> Regex</label>
      <label title="Case sensitive"><input id="searchCase" type="checkbox" /> Case</label>
      <button id="searchClearBtn" title="Clear search" style="background:transparent;border:none;color:var(--muted);cursor:pointer">✕</button>
    </div>

    <div id="controls">
      <button id="clearBtn">Clear</button>
      <button id="exportJsonBtn" class="primary">Export JSON</button>
      <button id="exportTxtBtn">Export TXT</button>
      <button id="copyBtn">Copy</button>
    </div>
  </header>

  <div id="log"></div>
</div>

<div id="newBadge">New messages</div>
<div id="toast"></div>

<script>
// --- utilities ---
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function syntaxHighlight(json){
  json = escapeHtml(json);
  json = json.replace(/"(.*?)"(?=\s*:)/g, '<span class="json-key">"$1"</span>');
  json = json.replace(/: "(.*?)"/g, ': <span class="json-string">"$1"</span>');
  json = json.replace(/: (\d+\.?\d*)/g, ': <span class="json-number">$1</span>');
  json = json.replace(/\b(true|false)\b/g, '<span class="json-boolean">$1</span>');
  json = json.replace(/\b(null)\b/g, '<span class="json-null">$1</span>');
  return json;
}

const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
const newBadge = document.getElementById('newBadge');
const toast = document.getElementById('toast');

const searchInput = document.getElementById('searchInput');
const searchScope = document.getElementById('searchScope');
const searchRegex = document.getElementById('searchRegex');
const searchCase = document.getElementById('searchCase');
const searchClearBtn = document.getElementById('searchClearBtn');

// stats elements
const errVisibleEl = document.getElementById('errVisible');
const warnVisibleEl = document.getElementById('warnVisible');
const infoVisibleEl = document.getElementById('infoVisible');
const errTotalEl = document.getElementById('errTotal');
const warnTotalEl = document.getElementById('warnTotal');
const infoTotalEl = document.getElementById('infoTotal');

let storedLogs = []; // store raw log objects for export

document.getElementById('clearBtn').onclick = () => { storedLogs = []; renderLogs(); hideNewBadge(); showToast('Cleared logs'); };
document.getElementById('exportJsonBtn').onclick = () => exportLogs('json');
document.getElementById('exportTxtBtn').onclick = () => exportLogs('txt');
document.getElementById('copyBtn').onclick = () => exportLogs('copy');
searchClearBtn.onclick = () => { searchInput.value = ''; applySearch(); searchInput.focus(); };

function showNewBadge() { newBadge.style.display = 'block'; }
function hideNewBadge() { newBadge.style.display = 'none'; }
newBadge.onclick = () => { scrollToBottom(true); hideNewBadge(); };

function showToast(msg, ms = 2000){
  toast.textContent = msg;
  toast.style.display = 'block';
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => { toast.style.display = 'none'; }, ms);
}

// smooth scroll helper (fallback)
function scrollToBottom(smooth) {
  try {
    if('scrollTo' in logEl && smooth) {
      logEl.scrollTo({ top: logEl.scrollHeight, behavior: 'smooth' });
    } else {
      logEl.scrollTop = logEl.scrollHeight;
    }
  } catch(e) {
    logEl.scrollTop = logEl.scrollHeight;
  }
}

function isNearBottom(thresholdPx = 120) {
  return (logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight) <= thresholdPx;
}

function copyTextToClipboard(text){
  if(!text) return Promise.reject(new Error('No text'));
  if(navigator.clipboard && navigator.clipboard.writeText){
    return navigator.clipboard.writeText(text);
  }
  return new Promise((resolve, reject) => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if(ok) resolve(); else reject();
    } catch(e){
      document.body.removeChild(ta);
      reject(e);
    }
  });
}

// ---------- rendering helpers ----------
function detectJsonInMessage(raw){
  if(typeof raw !== 'string') return null;
  // try parse entire string
  try {
    const parsed = JSON.parse(raw);
    return JSON.stringify(parsed, null, 2);
  } catch(e) {
    // try substring starting at first { or [
    const idx = raw.search(/[\{\[]/);
    if(idx >= 0){
      const candidate = raw.slice(idx);
      try {
        const parsed2 = JSON.parse(candidate);
        return JSON.stringify(parsed2, null, 2);
      } catch(e2){
        return null;
      }
    }
    return null;
  }
}

function createRowFromLog(obj){
  const t = obj.t || new Date().toISOString();
  const ts = new Date(t).toLocaleString();
  const tsShort = new Date(t).toLocaleTimeString();

  let raw = (obj.m === undefined || obj.m === null) ? '' : (typeof obj.m === 'string' ? obj.m : JSON.stringify(obj.m));
  const level = (obj.level || '').toUpperCase() || 'INFO';
  const title = obj.title || '';

  let cls = 'level-info';
  if(level === 'WARNING' || level === 'WARN') cls = 'level-warning';
  if(level === 'ERROR') cls = 'level-error';
  if(level === 'DEBUG') cls = 'level-debug';

  const row = document.createElement('div');
  row.className = 'line ' + cls;

  const tspan = document.createElement('div');
  tspan.className = 't';
  tspan.textContent = ts;

  const content = document.createElement('div');
  content.className = 'content';

  const meta = document.createElement('span');
  meta.className = 'meta';
  meta.textContent = level;

  // small mobile timestamp (shown when .t is hidden)
  const mobileTs = document.createElement('div');
  mobileTs.className = 'small small-mobile';
  mobileTs.textContent = tsShort;

  if(title && title.trim().length > 0){
    const titleEl = document.createElement('div');
    titleEl.className = 'title';
    titleEl.textContent = title;
    content.appendChild(titleEl);
  }

  // JSON detection
  const prettyJson = detectJsonInMessage(raw);

  const msgDiv = document.createElement('div');
  msgDiv.className = 'message';

  if(prettyJson){
    // show prefix (before JSON) if any
    const idx = raw.indexOf(prettyJson.trim());
    if(idx > 0){
      const prefix = raw.slice(0, idx);
      const p = document.createElement('div');
      p.innerHTML = escapeHtml(prefix).replace(/\n/g,'<br/>');
      msgDiv.appendChild(p);
    }

    const toggle = document.createElement('button');
    toggle.className = 'json-toggle';
    toggle.textContent = 'toggle json';

    const copyBtn = document.createElement('button');
    copyBtn.className = 'json-copy-btn';
    copyBtn.textContent = 'copy json';

    const pre = document.createElement('pre');
    pre.className = 'json-block';
    pre.textContent = prettyJson;
    pre.innerHTML = syntaxHighlight(pre.innerHTML);

    let collapsed = false;
    toggle.onclick = () => {
      collapsed = !collapsed;
      pre.style.display = collapsed ? 'none' : 'block';
      toggle.textContent = collapsed ? 'show json' : 'hide json';
    };

    copyBtn.onclick = () => {
      copyTextToClipboard(pre.textContent).then(() => {
        showToast('Copied JSON');
      }).catch(() => {
        showToast('Copy failed');
      });
    };

    const metaWrap = document.createElement('div');
    metaWrap.appendChild(meta);
    metaWrap.appendChild(toggle);
    metaWrap.appendChild(copyBtn);

    content.appendChild(metaWrap);
    msgDiv.appendChild(pre);
  } else {
    const html = escapeHtml(raw).replace(/\n/g,'<br/>');
    // for compact mobile view include meta on top
    msgDiv.innerHTML = '<div style="margin-bottom:6px"><span class="meta">' + meta.textContent + '</span></div>' + html;
  }

  content.appendChild(mobileTs);
  content.appendChild(msgDiv);
  row.appendChild(tspan);
  row.appendChild(content);

  return row;
}

// Render logs (respect current search filter) and update stats
function renderLogs(){
  logEl.innerHTML = '';

  const q = searchInput.value || '';
  const useRegex = searchRegex.checked;
  const caseSensitive = searchCase.checked;
  const scope = (searchScope.value || 'all');

  let re = null;
  if(q && useRegex){
    try {
      re = new RegExp(q, caseSensitive ? '' : 'i');
    } catch(e) {
      // invalid regex -> no matches
      re = null;
    }
  } else if(q){
    const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    re = new RegExp(escaped, caseSensitive ? '' : 'i');
  }

  // Totals across storedLogs
  let totals = { ERROR:0, WARNING:0, INFO:0 };
  for(const o of storedLogs){
    const lvl = (o.level || '').toUpperCase() || 'INFO';
    if(lvl === 'ERROR') totals.ERROR++;
    else if(lvl === 'WARNING' || lvl === 'WARN') totals.WARNING++;
    else totals.INFO++;
  }
  errTotalEl.textContent = totals.ERROR;
  warnTotalEl.textContent = totals.WARNING;
  infoTotalEl.textContent = totals.INFO;

  // Visible counts while rendering
  let visible = { ERROR:0, WARNING:0, INFO:0 };

  for(const obj of storedLogs){
    // matching
    let matched = true;
    if(q){
      matched = false;
      const level = (obj.level || '').toString();
      const title = (obj.title || '').toString();
      let msg = '';
      if(obj.m === undefined || obj.m === null) msg = '';
      else if(typeof obj.m === 'string') msg = obj.m;
      else {
        try { msg = JSON.stringify(obj.m); } catch(e) { msg = String(obj.m); }
      }

      const fields = {
        level,
        title,
        message: msg
      };

      if(scope === 'all'){
        if(re){
          if(re.test(level) || re.test(title) || re.test(msg)) matched = true;
        }
      } else {
        const target = fields[scope] || '';
        if(re){
          if(re.test(target)) matched = true;
        }
      }
    }

    if(matched){
      // increment visible counters
      const lvl = (obj.level || '').toUpperCase() || 'INFO';
      if(lvl === 'ERROR') visible.ERROR++;
      else if(lvl === 'WARNING' || lvl === 'WARN') visible.WARNING++;
      else visible.INFO++;

      const row = createRowFromLog(obj);
      logEl.appendChild(row);
    }
  }

  // update visible stats
  errVisibleEl.textContent = visible.ERROR;
  warnVisibleEl.textContent = visible.WARNING;
  infoVisibleEl.textContent = visible.INFO;

  if(isNearBottom(120)) scrollToBottom(true);
}

// ---------- add / store logs ----------
function addLogLine(obj){
  // push a deep-ish copy to storedLogs (avoid DOM references)
  try {
    storedLogs.push(JSON.parse(JSON.stringify(obj)));
  } catch(e) {
    storedLogs.push(Object.assign({}, obj));
  }

  // Re-render (keeps search consistent) which also updates stats
  renderLogs();

  // Show badge if we're not near bottom
  if(!isNearBottom(120)) showNewBadge();
  else hideNewBadge();
}

// Export utilities
function getFilename(ext){
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const stamp = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) + '_' + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());
  return `fli_logs_${stamp}.${ext}`;
}

function exportLogs(type = 'json'){
  if(!storedLogs || storedLogs.length === 0){
    showToast('No logs to export');
    return;
  }

  if(type === 'json'){
    const data = JSON.stringify(storedLogs, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    downloadBlob(blob, getFilename('json'));
    showToast('Exported JSON');
  } else if(type === 'txt'){
    const lines = storedLogs.map(o => {
      const t = o.t || new Date().toISOString();
      const ts = new Date(t).toLocaleString();
      const lvl = (o.level || 'INFO').toUpperCase();
      const title = o.title ? (o.title + ' - ') : '';
      let msg = '';
      if(o.m === undefined || o.m === null) {
        msg = '';
      } else if(typeof o.m === 'string') {
        msg = o.m;
      } else {
        try { msg = JSON.stringify(o.m); } catch(e) { msg = String(o.m); }
      }
      // flatten newlines to keep readability
      msg = msg.replace(/\r\n/g, '\n');
      return `${ts} [${lvl}] ${title}${msg}`;
    });
    const data = lines.join('\n\n');
    const blob = new Blob([data], { type: 'text/plain' });
    downloadBlob(blob, getFilename('txt'));
    showToast('Exported TXT');
  } else if(type === 'copy'){
    // copy human-readable text
    const lines = storedLogs.map(o => {
      const t = o.t || new Date().toISOString();
      const ts = new Date(t).toLocaleString();
      const lvl = (o.level || 'INFO').toUpperCase();
      const title = o.title ? (o.title + ' - ') : '';
      let msg = '';
      if(o.m === undefined || o.m === null) {
        msg = '';
      } else if(typeof o.m === 'string') {
        msg = o.m;
      } else {
        try { msg = JSON.stringify(o.m); } catch(e) { msg = String(o.m); }
      }
      return `${ts} [${lvl}] ${title}${msg}`;
    }).join('\n\n');
    copyTextToClipboard(lines).then(() => {
      showToast('Copied logs to clipboard');
    }).catch(()=> {
      showToast('Copy failed');
    });
  } else {
    showToast('Unknown export type');
  }
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

// ---------- search handling (debounced) ----------
let _searchTimeout = null;
function applySearch(){
  clearTimeout(_searchTimeout);
  _searchTimeout = setTimeout(() => {
    renderLogs();
  }, 200);
}
searchInput.addEventListener('input', applySearch);
searchRegex.addEventListener('change', applySearch);
searchCase.addEventListener('change', applySearch);
searchScope.addEventListener('change', applySearch);

// Hide badge if user scrolls to bottom manually
logEl.addEventListener('scroll', () => {
  if (isNearBottom(40)) {
    hideNewBadge();
  }
});

// ---------- connect SSE ----------
(function connect(){
  let url = '/events';
  url += '?key=__FLI_KEY__';
  const es = new EventSource(url);
  es.onopen = function(){ statusEl.textContent = 'Connected'; statusEl.style.color = ''; };
  es.onerror = function(){ statusEl.textContent = 'Disconnected — reconnecting...'; statusEl.style.color = '#ffb86b'; };
  es.onmessage = function(evt){
    try {
      const obj = JSON.parse(evt.data);
      addLogLine(obj);
    } catch(e){
      if(evt.data && evt.data.trim().length) {
        addLogLine({ t: new Date().toISOString(), m: evt.data });
      }
    }
  };
})();
</script>
</body>
</html>
